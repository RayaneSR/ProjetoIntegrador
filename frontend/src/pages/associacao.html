<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>Associação de Fornecedor a Produto</title>
</head>

<body>
    <div class="container">
        <button onclick="window.location.href='./index.html'">Voltar</button>
        <br><br>
        <h1>Detalhes do Produto</h1>

        <form id="formAssociacao">

            <div>
                <label for="produto"> Produto:</label><br>
                <select id="produto" required>
                    <option value="">Selecione um produto</option>
                </select>
            </div>

            <br><br>

            <div>
                <label>Fornecedor:</label><br>
                <select id="fornecedor" required>
                    <option value="">Selecione um fornecedor</option>

                </select>
            </div>

            <br><br>

            <input type="submit" value="Associar">
        </form>
        <hr>
        <h2>Associações realizadas</h2>
        <ul id="listaAssociacoes"></ul>

        <script>
            async function carregarFornecedores() {

                const resposta = await fetch("http://localhost:3000/fornecedores");

                const fornecedores = await resposta.json();

                const select = document.getElementById("fornecedor");

                fornecedores.forEach(fornecedor => {

                    select.innerHTML +=
                        `<option value="${fornecedor.id}">
            ${fornecedor.nome_empresa}
        </option>`;

                });

            }

            carregarFornecedores();

            async function carregarProdutos() {

                const resposta = await fetch("http://localhost:3000/produtos");

                const produtos = await resposta.json();

                const select = document.getElementById("produto");

                produtos.forEach(produto => {

                    select.innerHTML +=
                        `<option value="${produto.id}">
            ${produto.nome_produto}
        </option>`;

                });

            }

            carregarProdutos();

            const formulario = document.getElementById("formAssociacao");

            formulario.addEventListener("submit", async function (event) {

                event.preventDefault();

                const associacao = {

                    fornecedor_id: document.getElementById("fornecedor").value,

                    produto_id: document.getElementById("produto").value

                };

                try {

                    const resposta = await fetch("http://localhost:3000/associacoes", {

                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify(associacao)

                    });

                    const dados = await resposta.json();

                    alert(dados.mensagem);

                    if (resposta.ok) {
                        formulario.reset();

                        carregarAssociacoes();
                    }

                } catch (erro) {

                    alert("Erro ao conectar com o servidor.");

                    console.error(erro);

                }

            });


            async function carregarAssociacoes() {

                const resposta = await fetch("http://localhost:3000/associacoes");

                const associacoes = await resposta.json();

                const lista = document.getElementById("listaAssociacoes");

                lista.innerHTML = "";

                associacoes.forEach(associacao => {

                    lista.innerHTML +=
                        `<li>Fornecedor: ${associacao.nome_empresa} - Produto: ${associacao.nome_produto}</li>`;

                });

            }

            carregarAssociacoes();
        </script>
    </div>
</body>
